<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Google Drive</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #202124;
            color: white;
            flex-direction: column;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            background-color: #8ab4f8;
            color: #202124;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover { background-color: #9ebff9; }
        .instructions {
            text-align: center;
            max-width: 600px;
            line-height: 1.5;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="instructions">
        <h2>Маскировка + ProxyPal</h2>
        <p>Нажмите кнопку ниже.</p>
        <p>Ссылка на чит автоматически скопируется, вам останется только нажать <b>Ctrl + V</b> внутри прокси!</p>
    </div>

    <button onclick="openCloak()">Launch</button>

    <script>
        function openCloak() {
            // Копируем ссылку на чит в буфер обмена
            var cheatUrl = 'https://blooketbot.schoolcheats.net/';
            navigator.clipboard.writeText(cheatUrl).catch(function(err) {
                console.error('Не удалось скопировать текст: ', err);
            });

            // Открываем новую вкладку about:blank
            var win = window.open('about:blank', '_blank');
            
            if (!win) {
                alert("Пожалуйста, разрешите всплывающие окна!");
                return;
            }

            win.document.body.style.margin = '0';
            win.document.body.style.height = '100vh';
            
            // Настраиваем название и иконку (Маскировка)
            win.document.title = "Google Drive";
            var link = win.document.createElement('link');
            link.rel = 'icon';
            link.href = 'https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png';
            win.document.head.appendChild(link);

            // Создаем iframe
            var iframe = win.document.createElement('iframe');
            iframe.style.border = 'none';
            iframe.style.width = '100vw';
            iframe.style.height = '100vh';
            iframe.style.margin = '0';
            
            // Вставляем ссылку на ВАШ рабочий прокси
            iframe.src = 'https://proxypal.net/';
            
            win.document.body.appendChild(iframe);
            
            // Опционально: прячем оригинальную вкладку
            // window.location.replace('https://classroom.google.com');
        }
    </script>
</body>
</html>
