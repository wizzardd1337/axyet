<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- Название вкладки, чтобы не вызывать подозрений -->
    <title>Google Drive</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #202124;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            background-color: #8ab4f8;
            color: #202124;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background-color: #9ebff9; }
    </style>
</head>
<body>

    <button onclick="openCloak()">Launch</button>

    <script>
        function openCloak() {
            // Открываем новую вкладку about:blank
            var win = window.open('about:blank', '_blank');
            
            // Если браузер заблокировал всплывающее окно
            if (!win) {
                alert("Пожалуйста, разрешите всплывающие окна для этого файла!");
                return;
            }

            // Настраиваем страницу
            win.document.body.style.margin = '0';
            win.document.body.style.height = '100vh';
            
            // Делаем вкладку похожей на Google
            win.document.title = "Google Drive";
            var link = win.document.createElement('link');
            link.rel = 'icon';
            link.href = 'https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png';
            win.document.head.appendChild(link);

            // Создаем iframe (окно, в котором загрузится нужный сайт)
            var iframe = win.document.createElement('iframe');
            iframe.style.border = 'none';
            iframe.style.width = '100vw';
            iframe.style.height = '100vh';
            iframe.style.margin = '0';
            iframe.src = 'https://blooketbot.schoolcheats.net/';
            
            win.document.body.appendChild(iframe);
            
            // Опционально: можно перенаправить исходную страницу куда-то еще, чтобы спрятать улики
            // window.location.replace('https://classroom.google.com');
        }
    </script>
</body>
</html>
