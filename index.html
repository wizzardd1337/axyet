<html prefix="og: https://ogp.me/ns#">

<head>
    <script>
        var isCloaked = (window.name === "cloak");
        if (!isCloaked) {
            document.addEventListener("DOMContentLoaded", function () {
                // Save original HTML before wiping the body
                var originalHTML = document.documentElement.outerHTML;

                // Wipe body and show Launch button
                document.body.innerHTML = `
                    <div style="display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background: #000; font-family: 'Inter', sans-serif;">
                        <button id="launchBtn" style="padding: 16px 32px; font-size: 18px; font-weight: 600; border-radius: 14px; background: #0071e3; color: white; border: none; cursor: pointer; box-shadow: 0 4px 14px rgba(0, 113, 227, 0.4);">Launch</button>
                        <p style="color: #86868b; margin-top: 15px; font-size: 14px;">Opens BlooketBot secretly in an about:blank tab.</p>
                    </div>
                `;

                document.getElementById("launchBtn").onclick = function () {
                    var win = window.open("about:blank", "cloak");
                    if (win) {
                        win.document.open();
                        win.document.write(originalHTML);
                        win.document.close();

                        // Disguise the new tab
                        win.document.title = "about:blank";
                        var links = win.document.querySelectorAll("link[rel*='icon']");
                        links.forEach(link => link.remove()); // Remove original icons
                        var icon = win.document.createElement('link');
                        icon.type = 'image/png';
                        icon.rel = 'shortcut icon';
                        icon.href = 'https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png';
                        win.document.getElementsByTagName('head')[0].appendChild(icon);

                        // Hide the original tab by redirecting to Google
                        window.location.replace("https://google.com");
                    } else {
                        alert("Please allow popups to launch the cloaker!");
                    }
                };
            });
        }
    </script>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css?family=Nunito:400,700|Titan+One|Creepster|Satisfy|Eczar:700" />
    <link rel="icon" href="https://blooketbot.schoolcheats.net/bblogo.png" />
    <title>Blooket Bot</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --glass-bg: rgba(20, 20, 20, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-blur: blur(24px);
            --accent: #0071e3;
            --accent-hover: #0077ed;
            --text-main: #f5f5f7;
            --text-muted: #86868b;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text-main);
            overflow: hidden;
            background-color: #000;
        }

        .bg-mesh {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(at 0% 0%, rgba(67, 10, 161, 0.5) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(13, 90, 153, 0.5) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(158, 21, 106, 0.5) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(16, 114, 116, 0.5) 0px, transparent 50%);
            filter: blur(60px);
            z-index: -1;
            animation: pulse 15s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            100% {
                transform: scale(1.1);
            }
        }

        .mainBody {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100vh;
            position: relative;
        }

        .centerStage {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            max-height: 100vh;
            overflow-y: auto;
        }

        .centerStage::-webkit-scrollbar {
            display: none;
        }

        .codecontainer {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
        }

        .header-title {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            margin: 0 0 10px 0;
            background: linear-gradient(135deg, #fff, #a5a5a5);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding-left: 5px;
        }

        .glass-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 16px 20px;
            font-size: 16px;
            color: white;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            font-family: 'Inter', sans-serif;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .glass-input:focus {
            border-color: var(--accent);
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.2), inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .split-row {
            display: flex;
            gap: 15px;
        }

        .split-row .input-group {
            flex: 1;
        }

        select.glass-input {
            appearance: none;
            cursor: pointer;
        }

        select.glass-input option {
            background: #222;
            color: #fff;
        }

        .joinButton {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 4px 14px rgba(0, 113, 227, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            user-select: none;
        }

        .joinButton:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }

        .joinButton:active {
            transform: translateY(1px);
        }

        .toggle-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 5px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .toggle-group:last-of-type {
            border-bottom: none;
        }

        .toggle-label {
            font-size: 15px;
            font-weight: 500;
        }

        .toggle-switch {
            position: relative;
            width: 46px;
            height: 26px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 26px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
            transition: 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .toggle-switch[checked="true"] {
            background: #34c759;
        }

        .toggle-switch[checked="true"]::after {
            transform: translateX(20px);
        }

        /* Status & Error */
        #status {
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 10px;
            font-weight: 500;
        }

        #error {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-150%);
            background: rgba(255, 59, 48, 0.8);
            backdrop-filter: blur(10px);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(255, 59, 48, 0.3);
            transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            z-index: 9999;
        }

        .discord-link {
            text-align: center;
            color: var(--accent);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            margin-top: 10px;
            transition: 0.2s;
        }

        .discord-link:hover {
            color: var(--text-main);
        }

        /* Cheat Panel Styling */
        .cheatcontainer {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .button {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 12px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }

        .button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }

        .button:active {
            transform: translateY(1px);
        }

        .inputcontainer {
            display: flex;
            flex-direction: column;
            gap: 5px;
            background: rgba(0, 0, 0, 0.2);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .inputcontainer div {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .inputcontainer input,
        .inputcontainer select {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 10px;
            color: white;
            outline: none;
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
        }

        .inputcontainer input:focus,
        .inputcontainer select:focus {
            border-color: var(--accent);
            background: rgba(0, 0, 0, 0.5);
        }

        .normtext {
            color: white;
            font-size: 18px !important;
            font-weight: 600;
            text-align: center;
        }

        /* Needed for script compatibility */
        .chat,
        .chatinpcontainer,
        .dragcontainer {
            display: none !important;
        }

        .btext {
            display: inline;
        }
    </style>
</head>

<body>
    <div class="bg-mesh"></div>
    <div id="error"></div>

    <div class="mainBody">
        <div class="centerStage">
            <div class="codecontainer" id="cc">
                <h1 class="header-title">BlooketBot</h1>

                <div class="input-group">
                    <label>Game ID</label>
                    <input id="gcode" class="glass-input" placeholder="123456" type="number" />
                </div>

                <div class="split-row">
                    <div class="input-group">
                        <label>Nickname</label>
                        <input id="gname" class="glass-input" placeholder="Name" />
                    </div>
                    <div class="input-group">
                        <label>Bot Amount</label>
                        <input id="gamount" class="glass-input" type="number" value="1" min="1" max="500" />
                    </div>
                </div>

                <div class="input-group">
                    <label>Force Custom Blook</label>
                    <select id="gblook" class="glass-input">
                        <option value="Random">Random</option>
                        <option value="Rainbow Astronaut">Rainbow Astronaut</option>
                        <option value="Ghost">Ghost</option>
                        <option value="Phantom King">Phantom King</option>
                        <option value="Tim the Alien">Tim the Alien</option>
                        <option value="King">King</option>
                        <option value="Megadon">Megadon</option>
                    </select>
                </div>

                <div class="joinButton" onclick="join()" role="button">
                    <div class="btext">Flood Game</div>
                </div>

                <div class="toggle-group">
                    <span class="toggle-label" title="Appends random real Blooket-style names (e.g. MythicBlade)">Random
                        Names</span>
                    <div id="randomnames" class="toggle-switch" checked="false"
                        onclick="this.setAttribute('checked', this.getAttribute('checked') === 'true' ? 'false' : 'true')">
                    </div>
                </div>

                <div class="toggle-group">
                    <span class="toggle-label" title="Uses cursed Zalgo text to ruin the screen">Zalgo Names
                        (Prank)</span>
                    <div id="zalgonames" class="toggle-switch" checked="false"
                        onclick="this.setAttribute('checked', this.getAttribute('checked') === 'true' ? 'false' : 'true')">
                    </div>
                </div>

                <div class="toggle-group">
                    <span class="toggle-label" title="Names will be completely invisible">Ghost Bots</span>
                    <div id="ghostbots" class="toggle-switch" checked="false"
                        onclick="this.setAttribute('checked', this.getAttribute('checked') === 'true' ? 'false' : 'true')">
                    </div>
                </div>

                <div class="toggle-group">
                    <span class="toggle-label">Incognito Mode</span>
                    <div id="icogmode" class="toggle-switch" checked="true"
                        onclick="this.setAttribute('checked', this.getAttribute('checked') === 'true' ? 'false' : 'true')">
                    </div>
                </div>
                <div class="toggle-group">
                    <span class="toggle-label">Bypass Filter</span>
                    <div id="bcf" class="toggle-switch" checked="false"
                        onclick="this.setAttribute('checked', this.getAttribute('checked') === 'true' ? 'false' : 'true')">
                    </div>
                </div>
                <div class="toggle-group" style="display: none;">
                    <span class="toggle-label">First Place Switch</span>
                    <div id="fpswitch" class="toggle-switch" checked="false"
                        onclick="this.setAttribute('checked', this.getAttribute('checked') === 'true' ? 'false' : 'true')">
                    </div>
                </div>

                <!-- ctrlpanel was moved outside -->
                <a href="https://discord.gg/FcYy4uHUws" target="_blank" class="discord-link">Join the discord
                    server!</a>
                <text class="normtext" style="display: none" id="ostatus"></text>
            </div>

            <div class="codecontainer" id="ctrlpanel" style="display: none; margin-top: 20px;">
                <!-- Cheat elements will be injected here -->
            </div>
            <div id="status">Status: Ready</div>
        </div>
    </div>

    <!-- Firebase imports -->
    <script type="module">
        import { initializeApp, deleteApp } from 'https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js';
        import { getAuth, signInWithCustomToken, setPersistence } from 'https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js';
        import { getDatabase, ref, set, get, onValue } from 'https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js';
        window.initializeApp = initializeApp;
        window.getAuth = getAuth;
        window.deleteApp = deleteApp;
        window.getDatabase = getDatabase;
        window.ref = ref;
        window.set = set;
        window.get = get;
        window.onValue = onValue;
        window.signInWithCustomToken = signInWithCustomToken;
        window.setPersistence = setPersistence;
    </script>
    <script src="https://zalgo.org/lunicode.js"></script>
    <script>
        function join() {
            var cin = document.getElementById('gcode').value;
            var name = document.getElementById('gname').value;
            var amount = parseInt(document.getElementById('gamount').value) || 1;
            var icog = document.getElementById('icogmode').getAttribute('checked') === 'true';
            var randNames = document.getElementById('randomnames').getAttribute('checked') === 'true';
            var zalgo = document.getElementById('zalgonames').getAttribute('checked') === 'true';
            var ghost = document.getElementById('ghostbots').getAttribute('checked') === 'true';
            var blook = document.getElementById('gblook').value;

            if (typeof joinGame !== 'undefined') {
                joinGame(cin, name, icog, amount, { randNames, zalgo, ghost, blook });
            } else {
                errorBar("Script not loaded yet!");
            }
        }

        function errorBar(error) {
            var e = document.getElementById('error');
            e.innerText = error;
            e.style.transform = 'translate(-50%, 0)';
            setTimeout(function () {
                e.style.transform = 'translate(-50%, -150%)';
            }, 3000);
        }
    </script>
    <script src="./script.js"></script>
</body>

</html>
