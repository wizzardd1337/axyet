<style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --glass-bg: rgba(20, 20, 20, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-blur: blur(24px);
            --accent: #0071e3;
            --accent-hover: #0077ed;
            --text-main: #f5f5f7;
            --text-muted: #86868b;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text-main);
            overflow: hidden;
            background-color: #000;
        }

        /* Animated Mesh Gradient Background */
        .bg-mesh {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(at 0% 0%, rgba(67, 10, 161, 0.5) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(13, 90, 153, 0.5) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(158, 21, 106, 0.5) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(16, 114, 116, 0.5) 0px, transparent 50%);
            filter: blur(60px);
            z-index: -1;
            animation: pulse 15s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        .mainBody {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100vh;
            position: relative;
        }

        .centerStage {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        /* Liquid Glass Card */
        .codecontainer {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
        }

        .header-title {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            margin: 0 0 10px 0;
            background: linear-gradient(135deg, #fff, #a5a5a5);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Input Styling */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding-left: 5px;
        }

        .glass-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 16px 20px;
            font-size: 16px;
            color: white;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            font-family: 'Inter', sans-serif;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        .glass-input:focus {
            border-color: var(--accent);
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.2), inset 0 2px 4px rgba(0,0,0,0.2);
        }

        .glass-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        /* Split Row for inputs */
        .split-row {
            display: flex;
            gap: 15px;
        }
        .split-row .input-group {
            flex: 1;
        }

        /* Button Styling */
        .joinButton {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 4px 14px rgba(0, 113, 227, 0.4), inset 0 1px 0 rgba(255,255,255,0.2);
            user-select: none;
        }

        .joinButton:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 113, 227, 0.5), inset 0 1px 0 rgba(255,255,255,0.2);
        }

        .joinButton:active {
            transform: translateY(1px);
        }

        /* Toggle Switches */
        .toggle-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 5px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .toggle-group:last-of-type {
            border-bottom: none;
        }

        .toggle-label {
            font-size: 15px;
            font-weight: 500;
        }

        .toggle-switch {
            position: relative;
            width: 46px;
            height: 26px;
            background: rgba(255,255,255,0.2);
            border-radius: 26px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
            transition: 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .toggle-switch[checked="true"] {
            background: #34c759;
        }

        .toggle-switch[checked="true"]::after {
            transform: translateX(20px);
        }

        /* Status & Error */
        #status {
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 10px;
            font-weight: 500;
        }

        #error {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-150%);
            background: rgba(255, 59, 48, 0.8);
            backdrop-filter: blur(10px);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(255, 59, 48, 0.3);
            transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            z-index: 9999;
        }

        /* Hide legacy chat stuff initially */
        .chat, .chatinpcontainer, .dragcontainer { display: none !important; }
        
        .discord-link {
            text-align: center;
            color: var(--accent);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            margin-top: 15px;
            transition: 0.2s;
        }
        
        .discord-link:hover {
            color: var(--text-main);
        }
        
        /* Make legacy codecontainer children hidden if we don't need them */
        .normtext { display: none; }
        .btext { display: inline; }
    </style>

    <script>
        new MutationObserver((m) => m.forEach((r) => r.addedNodes.forEach((n) => n.nodeType === 1 && console.log('🆕 Added:', n)))).observe(document.body, { childList: true, subtree: true });
        console.log('👀 Monitoring DOM...');

        (function () {
            const SAME_ORIGIN_ONLY = true;

            function shouldBlock(url) {
                try {
                    const u = new URL(url, location.href);
                    return SAME_ORIGIN_ONLY && u.origin !== location.origin;
                } catch {
                    return false;
                }
            }

            const originalAssign = window.location.assign;
            const originalReplace = window.location.replace;

            window.location.assign = function (url) {
                // console.log('[location.assign]', url);
                if (shouldBlock(url)) {
                    // console.log('[BLOCKED][location.assign]', url);
                    return;
                }
                return originalAssign.call(this, url);
            };

            window.location.replace = function (url) {
                // console.log('[location.replace]', url);
                if (shouldBlock(url)) {
                    // console.log('[BLOCKED][location.replace]', url);
                    return;
                }
                return originalReplace.call(this, url);
            };

            document.addEventListener(
                'click',
                (e) => {
                    const a = e.target.closest?.('a[href]');
                    if (!a) return;

                    const url = new URL(a.href, location.href);

                    // console.log('[anchor click]', a.href);

                    if (url.origin !== location.origin) {
                        e.preventDefault();
                        e.stopImmediatePropagation();
                        // console.log('[BLOCKED][anchor redirect]', a.href);
                    }
                },
                true,
            );

            const originalXHROpen = XMLHttpRequest.prototype.open;
            const originalXHRSend = XMLHttpRequest.prototype.send;

            XMLHttpRequest.prototype.open = function (method, url, ...args) {
                this._url = url;
                return originalXHROpen.apply(this, [method, url, ...args]);
            };

            XMLHttpRequest.prototype.send = function (...args) {
                const resolvedURL = new URL(this._url, location.href);
                const crossOrigin = resolvedURL.origin !== location.origin;

                if (crossOrigin) {
                    const originalOnReadyStateChange = this.onreadystatechange;

                    this.onreadystatechange = function () {
                        if (this.readyState === 4) {
                            if (this.responseURL && this.responseURL !== resolvedURL.href) {
                                console.log('[BLOCKED][XHR redirect]', {
                                    from: resolvedURL.href,
                                    to: this.responseURL,
                                });
                                this.abort();
                                return;
                            }
                        }

                        if (originalOnReadyStateChange) {
                            originalOnReadyStateChange.apply(this, arguments);
                        }
                    };
                }

                return originalXHRSend.apply(this, args);
            };

            const originalFetch = window.fetch;

            window.fetch = function (input, options = {}) {
                const url = typeof input === 'string' ? input : input.url;
                const resolvedURL = new URL(url, location.href);
                const crossOrigin = resolvedURL.origin !== location.origin;

                if (crossOrigin) {
                    options = { ...options, redirect: 'manual' };
                }

                return originalFetch(input, options)
                    .then((response) => {
                        if (crossOrigin && response.redirected) {
                            // console.log('[BLOCKED][fetch redirect]', response.url);
                            return new Response(null, { status: 200 });
                        }
                        return response;
                    })
                    .catch(() => new Response(null, { status: 200 }));
            };

            const originalEval = window.eval;

            window.eval = function (code) {
                if (typeof code === 'string') {
                    if (code.includes('window.top.location') || code.includes('document.location') || code.includes('location.href')) {
                        const sanitized = code
                            .replace(/window\.top\.location\s*=\s*[^;]+;?/g, '')
                            .replace(/location\.href\s*=\s*[^;]+;?/g, '')
                            .replace(/document\.location\s*=\s*[^;]+;?/g, '')
                            .replace(/\.assign\([^)]*\);?/g, '')
                            .replace(/\.replace\([^)]*\);?/g, '');

                        return originalEval.call(this, sanitized);
                    }
                }
                return originalEval.call(this, code);
            };

            const originalSetTimeout = window.setTimeout;
            window.setTimeout = function (fn, delay) {
                if (typeof fn === 'function' && (delay == undefined || delay == null)) {
                    const fnText = fn.toString();
                    if (fnText.includes('href')) {
                        return 0;
                    }
                }
                return originalSetTimeout.apply(this, arguments);
            };
        })();
